<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Home Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top left, #050505, #0a0a0a 70%);
            color: #00eaff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }

        header .greeting {
            font-weight: 600;
            color: #00ffff;
            text-shadow: 0 0 8px #00ffff;
        }

        header .weather {
            font-weight: 500;
            color: #a0faff;
        }

        main {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
            transition: 0.3s;
            text-align: center;
            align-content: center;
        }

        .card:hover {
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            transform: translateY(-5px);
        }

        /* Clock & Date */
        #time {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff;
        }

        #date {
            text-align: center;
            margin-top: 10px;
            font-size: 1.2rem;
            color: #a0faff;
            opacity: 0.8;
        }

        /* GIF */
        .gif-box img {
            width: 100%;
            height: 60%;
            border-radius: 15px;
            object-fit: cover;
        }

        /* Quote */
        .quote {
            font-size: 1.2rem;
            color: #b0ffff;
            font-style: italic;
            text-align: center;
            line-height: 1.5;
        }

        .quote small {
            display: block;
            margin-top: 10px;
            color: #00aaff;
        }

        /* To-do list */
        .todo {
            text-align: left;
        }

        .todo input {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.07);
            border: none;
            outline: none;
            color: #00ffff;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .todo ul {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .todo ul li {
            background: rgba(0, 255, 255, 0.08);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #a0faff;
        }

        .todo ul li button {
            background: none;
            border: none;
            color: #ff4d4d;
            font-size: 1rem;
            cursor: pointer;
        }

        @media (max-width: 700px) {
            #time {
                font-size: 2.5rem;
            }
        }

        /* Shortcuts */
        #shortcutContainer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;

            max-height: 234px;
            /* 3 rows */
            overflow-y: auto;
            padding-right: 5px;
        }

        #shortcutContainer::-webkit-scrollbar {
            width: 6px;
        }

        #shortcutContainer::-webkit-scrollbar-track {
            background: transparent;
        }

        #shortcutContainer::-webkit-scrollbar-thumb {
            background: #00ffff70;
            border-radius: 10px;
        }

        .shortcut {
            /* background: rgba(0, 255, 255, 0.1); */
            /* border: 1px solid rgba(0, 255, 255, 0.2); */
            border-radius: 12px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        .add-shortcut {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: 0.3s;
        }

        /* .shortcut:hover,
        .add-shortcut:hover {
            background: rgba(0, 255, 255, 0.2);
        } */

        .add-shortcut {
            font-size: 28px;
            color: #00ffff;
        }

        .shortcut a {
            text-decoration: none;
            color: #a0faff;
            font-size: 14px;
        }

        .shortcut button {
            position: absolute;
            top: 2px;
            right: 5px;
            border: none;
            background: none;
            color: red;
            cursor: pointer;
        }

        .shortcut img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        /* Modal */

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #0a0a0a;
            padding: 25px;
            border-radius: 15px;
            border: 1px solid #00ffff40;
            width: 300px;
        }

        .modal-content input {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: #111;
            border: none;
            color: #00ffff;
            border-radius: 8px;
        }

        .modal-actions {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: 0.25s;
            margin: 5px;
        }

        .modal-actions button:hover {
            background: rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
            transform: translateY(-1px);
        }

        /* Save button little highlight */
        #saveShortcut {
            border-color: #00ffff;
        }

        /* Cancel button red tone */
        #closeModal {
            border-color: #ff4d4d;
            color: #ff8080;
            background: rgba(255, 77, 77, 0.08);
        }

        #closeModal:hover {
            background: rgba(255, 77, 77, 0.2);
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.5);
        }
    </style>
</head>

<body>

    <!-- Top Greeting & Weather -->
    <header>
        <div class="greeting" id="greeting">Good Day, Sajjad!</div>
        <div class="weather" id="weather">☀️ --°C</div>
    </header>

    <main>
        <!-- Row 1: Time/Date & GIF -->
        <div class="row">
            <div class="card">
                <div id="shortcutContainer"></div>
            </div>
            <div class="card todo">
                <h2 style="text-align:center; color:#00ffff; margin-bottom:15px;">To-Do List</h2>
                <input type="text" id="todoInput" placeholder="Add a task...">
                <ul id="todoList"></ul>
            </div>
        </div>

        <!-- Row 2: Quote & To-Do -->
        <div class="row">
            <div class="card">
                <!-- <h2 style="text-align:center; color:#00ffff; margin-bottom:15px;">💬 Daily Motivation</h2> -->
                <div class="quote" id="quote">Loading...</div>
            </div>
            <div class="card ">
                <img style="text-align: center;"
                    src="https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExMHlhOTZkemQ2bzBqOThhNGVyM2E2cmp6eXJ5dDI0ZG0yNzhlbnJ1YyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/qgQUggAC3Pfv687qPC/giphy.gif"
                    alt="Dashboard Animation" height="300" width="500">
            </div>

        </div>
    </main>

    <div id="shortcutModal" class="modal">
        <div class="modal-content">
            <h3>Add Website Shortcut</h3>

            <input type="text" id="siteName" placeholder="Website name">

            <input type="text" id="siteUrl" placeholder="https://example.com">

            <div class="modal-actions">
                <button id="closeModal">Cancel</button>
                <button id="saveShortcut">Save</button>
            </div>
        </div>
    </div>

    <script>
        // 🕒 Time & Date
        // function updateClock() {
        //     const now = new Date();
        //     document.getElementById('time').textContent =
        //         now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        //     document.getElementById('date').textContent =
        //         now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        // }
        // setInterval(updateClock, 1000);
        // updateClock();

        // 🌞 Greeting
        function setGreeting() {
            const hour = new Date().getHours();
            const g = document.getElementById("greeting");
            if (hour < 12) g.textContent = "☀️ Good Morning, Sajjad!";
            else if (hour < 17) g.textContent = "🌤️ Good Afternoon, Sajjad!";
            else if (hour < 21) g.textContent = "🌆 Good Evening, Sajjad!";
            else g.textContent = "🌙 Good Night, Sajjad!";
        }
        setGreeting();

        // 🌦️ Weather (Open-Meteo API)
        async function getWeather() {
            try {
                const latitude = 23.8103;
                const longitude = 90.4125;

                const res = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`
                );
                const data = await res.json();
                const w = data.current_weather;

                // Simple icon based on temperature
                const icon = w.temperature > 30 ? "☀️" : w.temperature > 20 ? "⛅" : "🌥️";

                document.getElementById("weather").textContent = `${icon} ${w.temperature}°C`;
            } catch (err) {
                console.error(err);
                document.getElementById("weather").textContent = "⚠️ Weather unavailable";
            }
        }

        getWeather();


        // 💬 Motivation API
        async function loadQuote() {
            try {
                const res = await fetch("https://type.fit/api/quotes");
                const data = await res.json();
                const random = data[Math.floor(Math.random() * data.length)];
                document.getElementById("quote").innerHTML = `"${random.text}" <small>- ${random.author || "Unknown"}</small>`;
            } catch {
                document.getElementById("quote").innerHTML =
                    "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيلُ <br><small>Hasbunallah wanikmal wakil</small>";
            }
        }
        loadQuote();





        // ✅ To-Do List
        const todoInput = document.getElementById("todoInput");
        const todoList = document.getElementById("todoList");

        function saveTodos() {
            const todos = Array.from(todoList.children).map(li => li.firstChild.textContent);
            localStorage.setItem("dashboardTodos", JSON.stringify(todos));
        }
        function loadTodos() {
            const saved = JSON.parse(localStorage.getItem("dashboardTodos") || "[]");
            saved.forEach(addTodo);
        }
        function addTodo(text) {
            const li = document.createElement("li");
            li.innerHTML = `${text}<button>✕</button>`;
            li.querySelector("button").onclick = () => { li.remove(); saveTodos(); };
            todoList.appendChild(li);
        }
        todoInput.addEventListener("keydown", e => {
            if (e.key === "Enter" && todoInput.value.trim() !== "") {
                addTodo(todoInput.value.trim());
                todoInput.value = "";
                saveTodos();
            }
        });
        loadTodos();

        // SHORTCUT SYSTEM

        const modal = document.getElementById("shortcutModal");
        // const addBtn = document.getElementById("addShortcutBtn");
        const closeModal = document.getElementById("closeModal");
        const saveShortcut = document.getElementById("saveShortcut");

        const container = document.getElementById("shortcutContainer");

        // addBtn.onclick = () => modal.style.display = "flex";
        closeModal.onclick = () => modal.style.display = "none";


        function loadShortcuts() {

            const shortcuts = JSON.parse(localStorage.getItem("shortcuts") || "[]");

            container.innerHTML = "";

            // [+] button first
            const addBox = document.createElement("div");
            addBox.className = "add-shortcut";
            addBox.innerHTML = "+";
            addBox.onclick = () => modal.style.display = "flex";

            container.appendChild(addBox);


            shortcuts.forEach((s, index) => {

                const div = document.createElement("div");
                div.className = "shortcut";

                //         div.innerHTML = `
                //     <button onclick="deleteShortcut(${index})">✕</button>
                //     <a href="${s.url}" target="_blank">${s.name}</a>
                // `;
                let url = s.url;

                if (!url.startsWith("http")) {
                    url = "https://" + url;
                }

                const domain = new URL(url).hostname;

                div.innerHTML = `
<button onclick="deleteShortcut(${index})">✕</button>
<a href="${url}" target="_blank">
<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64">
<span class="shortcut-name">${s.name}</span>
</a>
`;

                container.appendChild(div);
            });

        }

        function saveShortcuts(list) {
            localStorage.setItem("shortcuts", JSON.stringify(list));
        }


        saveShortcut.onclick = () => {

            const name = document.getElementById("siteName").value.trim();
            const url = document.getElementById("siteUrl").value.trim();

            if (!name || !url) return;

            const shortcuts = JSON.parse(localStorage.getItem("shortcuts") || "[]");

            shortcuts.push({ name, url });

            saveShortcuts(shortcuts);

            modal.style.display = "none";

            document.getElementById("siteName").value = "";
            document.getElementById("siteUrl").value = "";

            loadShortcuts();
        }


        function deleteShortcut(index) {

            const shortcuts = JSON.parse(localStorage.getItem("shortcuts") || "[]");

            shortcuts.splice(index, 1);

            saveShortcuts(shortcuts);

            loadShortcuts();
        }

        loadShortcuts();
    </script>

</body>

</html>
